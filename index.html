  // === State ===
  var cur = 0;
  var ans = [null,null,null,null,null,null];
  var myResult = null;
  var LETTERS = ['A','B','C','D'];

  // === DOM helpers ===
  function $(id) { return document.getElementById(id); }

  function showScreen(n) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) {
      screens[i].classList.remove('active');
    }
    $('s' + n).classList.add('active');
    window.scrollTo(0, 0);
  }

  // === Render Question ===
  function renderQ() {
    var q = QS[cur];
    $('pText').textContent = (cur + 1) + ' / 6';
    $('pFill').style.width = ((cur + 1) / 6 * 100) + '%';
    $('qCat').textContent = q.cat;
    $('qText').textContent = q.q;
    $('qDesc').textContent = q.d;

    var box = $('opts');
    box.innerHTML = '';
    for (var i = 0; i < q.o.length; i++) {
      (function(idx) {
        var div = document.createElement('div');
        div.className = 'opt' + (ans[cur] === idx ? ' sel' : '');
        div.innerHTML = '<span class="opt-letter">' + LETTERS[idx] + '</span><span class="opt-label">' + q.o[idx].t + '</span>';
        div.addEventListener('click', function(e) {
          e.preventDefault();
          pickOpt(idx);
        });
        div.addEventListener('touchend', function(e) {
          e.preventDefault();
          pickOpt(idx);
        });
        box.appendChild(div);
      })(i);
    }

    $('bPrev').disabled = cur === 0;
    updateNext();
  }

  function pickOpt(i) {
    ans[cur] = i;
    var all = document.querySelectorAll('.opt');
    for (var j = 0; j < all.length; j++) {
      all[j].classList.toggle('sel', j === i);
    }
    updateNext();
  }

  function updateNext() {
    var btn = $('bNext');
    btn.disabled = ans[cur] === null;
    btn.textContent = cur === 5 ? '查看结果 →' : '下一题 →';
  }

  function goNext() {
    if (ans[cur] === null) return;
    if (cur < 5) { cur++; renderQ(); }
    else { showResult(); }
  }

  function goPrev() {
    if (cur > 0) { cur--; renderQ(); }
  }

  // === Calculate ===
  function calc() {
    var cnt = {};
    for (var i = 0; i < 6; i++) {
      if (ans[i] !== null) {
        var tp = QS[i].o[ans[i]].tp;
        cnt[tp] = (cnt[tp] || 0) + 1;
      }
    }
    var best = 'planner', bestN = 0;
    for (var k in cnt) {
      if (cnt[k] > bestN) { bestN = cnt[k]; best = k; }
    }
    return best;
  }

  // === Show Result ===
  function showResult() {
    showScreen(2);
    setTimeout(function() {
      myResult = calc();
      var r = RT[myResult];
      var h = '';
      h += '<div class="res-head">';
      h += '<div class="res-badge">✨ 你的文旅人格已解锁</div>';
      h += '<p class="res-pre">你在文旅行业最适合的角色是</p>';
      h += '<h1 class="res-name">' + r.name + '</h1>';
      h += '<p class="res-tagline">' + r.tag + '</p>';
      h += '</div>';

      h += '<div class="card">';
      h += '<div class="card-img"><img src="images/' + r.img + '" alt="' + r.name + '">';
      h += '<div class="card-img-grad"></div>';
      h += '<div class="card-img-name">' + r.name + '</div></div>';
      h += '<div class="card-body"><p>' + r.desc + '</p></div></div>';

      h += '<div class="section"><div class="section-title">📊 能力雷达</div>';
      for (var i = 0; i < r.stats.length; i++) {
        h += '<div class="stat"><span class="stat-name">' + r.stats[i].l + '</span>';
        h += '<div class="stat-track"><div class="stat-fill ' + r.stats[i].c + '" data-w="' + r.stats[i].v + '"></div></div>';
        h += '<span class="stat-val">' + r.stats[i].v + '</span></div>';
      }
      h += '</div>';

      h += '<div class="insight"><h3>💪 核心优势</h3><ul class="gold">';
      for (var i = 0; i < r.str.length; i++) h += '<li>' + r.str[i] + '</li>';
      h += '</ul></div>';

      h += '<div class="insight"><h3>🎯 发展建议</h3><ul class="purple">';
      for (var i = 0; i < r.adv.length; i++) h += '<li>' + r.adv[i] + '</li>';
      h += '</ul></div>';

      h += '<div class="tags"><div class="section-title">🏢 对标参考项目</div>';
      for (var i = 0; i < r.proj.length; i++) h += '<span class="tag">' + r.proj[i] + '</span>';
      h += '</div>';

      h += '<div class="actions">';
      h += '<button type="button" class="btn-act primary" id="btnShare">📤 分享我的文旅人格</button>';
      h += '<button type="button" class="btn-act secondary" id="btnRetry">🔄 重新测试</button>';
      h += '</div>';

      h += '<div class="footnote">* 本测试基于长三角15个文旅项目的业态研究，仅供参考<br>数据来源：《文旅业态：模仿的短命与创新的长红》李龙舟 2025</div>';

      $('s3').innerHTML = h;
      showScreen(3);

      // Animate bars
      setTimeout(function() {
        var fills = document.querySelectorAll('.stat-fill');
        for (var i = 0; i < fills.length; i++) {
          fills[i].style.width = fills[i].getAttribute('data-w') + '%';
        }
      }, 300);

      // Bind result buttons
      $('btnRetry').addEventListener('click', function(e) { e.preventDefault(); startQuiz(); });
      $('btnRetry').addEventListener('touchend', function(e) { e.preventDefault(); startQuiz(); });
      $('btnShare').addEventListener('click', function(e) { e.preventDefault(); doShare(); });
      $('btnShare').addEventListener('touchend', function(e) { e.preventDefault(); doShare(); });

    }, 2200);
  }

  function doShare() {
    var name = myResult ? RT[myResult].name : '';
    var txt = '我在文旅人格测试中是「' + name + '」！快来测测你的文旅天赋基因吧～';
    if (navigator.share) {
      navigator.share({ title: '我的文旅人格测试结果', text: txt, url: location.href }).catch(function(){});
    } else {
      // Try clipboard
      try {
        var ta = document.createElement('textarea');
        ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        var b = $('btnShare');
        if (b) { b.textContent = '✅ 已复制到剪贴板'; setTimeout(function(){ b.textContent = '📤 分享我的文旅人格'; }, 2000); }
      } catch(e) { alert(txt); }
    }
  }

  function startQuiz() {
    cur = 0; ans = [null,null,null,null,null,null]; myResult = null;
    showScreen(1);
    renderQ();
  }

  // === Init ===
  function init() {
    // Start button
    $('btnGo').addEventListener('click', function(e) {
      e.preventDefault();
      startQuiz();
    });
    $('btnGo').addEventListener('touchend', function(e) {
      e.preventDefault();
      startQuiz();
    });

    // Nav buttons
    $('bNext').addEventListener('click', function(e) { e.preventDefault(); goNext(); });
    $('bNext').addEventListener('touchend', function(e) { e.preventDefault(); goNext(); });
    $('bPrev').addEventListener('click', function(e) { e.preventDefault(); goPrev(); });
    $('bPrev').addEventListener('touchend', function(e) { e.preventDefault(); goPrev(); });
  }

  // Run on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
